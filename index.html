<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Critter Trek</title>
  </head>
  <body>
    <div id="app"></div>
    <div id="info">WASD to move · A/D to turn · Click & drag to orbit</div>

    <div id="combat-flash"></div>

    <div id="combat-overlay">
      <div id="combat-panel">
        <h2>⚔ Combat</h2>
        <div id="combat-stats">
          <div class="stat-row">
            <span class="stat-label">🦊 Fox</span>
            <span>HP: <span id="fox-hp">20</span></span>
          </div>
          <div class="stat-row">
            <span class="stat-label"><span id="enemy-icon">🐺</span> <span id="enemy-name">Wolf</span></span>
            <span>HP: <span id="enemy-hp">12</span></span>
          </div>
        </div>
        <div id="combat-log"></div>
        <div id="combat-main-actions">
          <button id="btn-attack" class="btn-action">Attack</button>
          <button id="btn-defend" class="btn-action">Defend</button>
          <button id="btn-flee" class="btn-action">Flee</button>
          <button id="btn-item" class="btn-action" disabled>Item</button>
        </div>
        <div id="combat-attack-types" style="display:none">
          <button id="btn-attack-fast" class="btn-attack-type fast">⚡ Fast</button>
          <button id="btn-attack-medium" class="btn-attack-type medium">🔵 Medium</button>
          <button id="btn-attack-slow" class="btn-attack-type slow">💥 Slow</button>
          <button id="btn-attack-back" class="btn-attack-back">← Back</button>
        </div>
      </div>
    </div>

    <div id="game-over-overlay">
      <div id="game-over-panel">
        <h1>The fox has fallen...</h1>
        <p>Refresh to try again.</p>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
