<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Critter Trek</title>
    <style>
      * { margin: 0; padding: 0; }
      body { overflow: hidden; background: #000; font-family: system-ui, sans-serif; }
      canvas { display: block; }
    </style>
  </head>
  <body style="margin:0;overflow:hidden;background:#000">
    <div id="loading" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font:24px sans-serif;z-index:9999;background:#111;">
      Loading game...
    </div>
    <script>
      console.log('[HTML] Page loaded at', window.location.href);
      console.log('[HTML] Script type module supported:', 'noModule' in HTMLScriptElement.prototype === false);
      window.__htmlLoaded = true;
      window.addEventListener('error', function(e) {
        console.log('[HTML] Caught error:', e.message, 'at', e.filename + ':' + e.lineno);
      });
      setTimeout(function(){
        var el = document.getElementById('loading');
        if (el) {
          if (window.__moduleExecuted) {
            el.textContent = 'Module executed but app may still have issues';
          } else {
            el.textContent = 'Game failed to load - check console for errors (module never executed)';
          }
        }
      }, 10000);
    </script>
    <style>
      #btn-drink {
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
        padding: 12px 28px; font-size: 18px; border: 2px solid #4a8ab5;
        background: rgba(30,60,100,0.8); color: #fff; border-radius: 8px;
        cursor: pointer; z-index: 100; font-family: system-ui, sans-serif;
        backdrop-filter: blur(4px); transition: 0.2s;
      }
      #btn-drink:hover { background: rgba(50,100,180,0.9); border-color: #6ab5e0; }
      #btn-dive {
        position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
        padding: 12px 28px; font-size: 18px; border: 2px solid #4a8ab5;
        background: rgba(30,60,100,0.8); color: #fff; border-radius: 8px;
        cursor: pointer; z-index: 100; font-family: system-ui, sans-serif;
        backdrop-filter: blur(4px); transition: 0.2s;
      }
      #btn-dive:hover { background: rgba(50,100,180,0.9); border-color: #6ab5e0; }
      #btn-dive.diving { background: rgba(180,80,50,0.8); border-color: #d48a5a; }
    </style>
    <div id="app"></div>
    <div id="info">WASD to move · A/D to turn · Click & drag to orbit</div>
    <button id="btn-drink" style="display:none">💧 Drink Water (E)</button>
    <button id="btn-dive" style="display:none">🌊 Dive (Q)</button>

    <div id="combat-flash"></div>

    <div id="combat-hud" style="display:none">
      <div id="fox-hud" class="combatant-hud">
        <div class="hud-name">🦊 Fox</div>
        <div class="hud-bar-bg"><div class="hud-bar-fill" id="fox-hp-fill"></div></div>
        <div class="hud-hp-text"><span id="fox-hp">20</span>/<span id="fox-max-hp">20</span></div>
      </div>
      <div id="enemy-hud" class="combatant-hud">
        <div class="hud-name"><span id="enemy-icon">🐺</span> <span id="enemy-name">Wolf</span></div>
        <div class="hud-bar-bg"><div class="hud-bar-fill" id="enemy-hp-fill"></div></div>
        <div class="hud-hp-text"><span id="enemy-hp">12</span>/<span id="enemy-max-hp">12</span></div>
      </div>
    </div>

    <div id="combat-ui" style="display:none">
      <div id="combat-log"></div>
      <div id="combat-actions">
        <div id="combat-main-actions">
          <button id="btn-attack" class="btn-action">Attack</button>
          <button id="btn-defend" class="btn-action">Defend</button>
          <button id="btn-flee" class="btn-action">Flee</button>
          <button id="btn-item" class="btn-action" disabled>Item</button>
        </div>
        <div id="combat-attack-types" style="display:none">
          <button id="btn-attack-fast" class="btn-atk fast">⚡ Fast</button>
          <button id="btn-attack-medium" class="btn-atk medium">🔵 Medium</button>
          <button id="btn-attack-slow" class="btn-atk slow">💥 Slow</button>
          <button id="btn-attack-back" class="btn-atk back">← Back</button>
        </div>
        <div id="combat-item-types" style="display:none">
          <button id="btn-item-stick" class="btn-item">🪵 Stick <span id="item-stick-count">0</span></button>
          <button id="btn-item-rock" class="btn-item">🪨 Rock <span id="item-rock-count">0</span></button>
          <button id="btn-item-sharpstick" class="btn-item">🗡️ Sharp Stick <span id="item-sharpstick-count">0</span></button>
          <button id="btn-item-cactusneedle" class="btn-item">🌵 Cactus Needle <span id="item-cactusneedle-count">0</span></button>
          <button id="btn-item-herb" class="btn-item">🌿 Herb <span id="item-herb-count">0</span></button>
          <button id="btn-item-berry" class="btn-item">🫐 Berry <span id="item-berry-count">0</span></button>
          <button id="btn-item-bone" class="btn-item">🦴 Bone <span id="item-bone-count">0</span></button>
          <button id="btn-item-mushroom" class="btn-item">🍄 Mushroom <span id="item-mushroom-count">0</span></button>
          <button id="btn-item-feather" class="btn-item">🪶 Feather <span id="item-feather-count">0</span></button>
          <button id="btn-item-seaweed" class="btn-item">🌱 Seaweed <span id="item-seaweed-count">0</span></button>
          <button id="btn-item-jellyfisharm" class="btn-item">🪼 Jellyfish Arm <span id="item-jellyfisharm-count">0</span></button>
          <button id="btn-item-starfisharm" class="btn-item">⭐ Starfish Arm <span id="item-starfisharm-count">0</span></button>
          <button id="btn-item-animalsword" class="btn-item">⚔️ Animal Sword <span id="item-animalsword-count">0</span></button>
          <button id="btn-item-animalpickaxe" class="btn-item">⛏️ Animal Pickaxe <span id="item-animalpickaxe-count">0</span></button>
          <button id="btn-item-animaltrident" class="btn-item">🔱 Animal Trident <span id="item-animaltrident-count">0</span></button>
          <button id="btn-item-back" class="btn-atk back">← Back</button>
        </div>
      </div>
    </div>

    <div id="game-over-overlay">
      <div id="game-over-panel">
        <h1>The fox has fallen...</h1>
        <p id="game-over-stats"></p>
        <button id="btn-restart">Restart</button>
      </div>
    </div>

    <div id="biome-menu" style="display:none">
      <div id="biome-menu-panel">
        <h2>Teleport to Biome</h2>
        <div id="biome-menu-buttons">
          <button data-biome="forest">🌲 Forest</button>
          <button data-biome="plains">🌾 Plains</button>
          <button data-biome="desert">🏜️ Desert</button>
          <button data-biome="tundra">❄️ Tundra</button>
          <button data-biome="swamp">🌿 Swamp</button>
          <button data-biome="mountain">⛰️ Mountain</button>
          <button data-biome="crystal">💎 Crystal</button>
          <button data-biome="canyon">🏜️ Canyon</button>
          <button data-biome="badlands">⛰️ Badlands</button>
          <button data-biome="ocean">🌊 Ocean</button>
        </div>
        <button id="biome-menu-close">Cancel (R)</button>
      </div>
    </div>

    <div id="crafting-menu" style="display:none">
      <div id="crafting-menu-panel">
        <h2>Crafting</h2>
        <div id="crafting-menu-recipes"></div>
        <button id="crafting-menu-close">Close (C)</button>
      </div>
    </div>

    <div id="mode-buttons">
      <button id="btn-mode-survival" class="mode-btn active">⚔️ Survival</button>
      <button id="btn-mode-creative" class="mode-btn">🎨 Creative</button>
    </div>

    <div id="chest-overlay" style="display:none">
      <div id="chest-panel">
        <h2 id="chest-title">📦 Chest</h2>
        <div id="chest-items"></div>
        <button id="btn-chest-collect">Take All</button>
        <button id="btn-chest-close">Close</button>
      </div>
    </div>

    <div id="btn-chest-open" style="display:none;position:fixed;bottom:130px;left:50%;transform:translateX(-50%);padding:12px 28px;font-size:18px;border:2px solid #b58a4a;background:rgba(80,60,30,0.85);color:#fff;border-radius:8px;cursor:pointer;z-index:100;font-family:system-ui,sans-serif;backdrop-filter:blur(4px);">
      📦 Open Chest
    </div>

    <div id="btn-buy-house" style="display:none;position:fixed;bottom:190px;left:50%;transform:translateX(-50%);padding:12px 28px;font-size:18px;border:2px solid #4a8ab5;background:rgba(40,70,120,0.85);color:#fff;border-radius:8px;cursor:pointer;z-index:100;font-family:system-ui,sans-serif;backdrop-filter:blur(4px);">
      🏠 Buy House
    </div>

    <div id="build-palette" style="display:none">
      <div id="build-palette-items"></div>
      <div id="build-palette-hint">Select item · <b>E</b> place · <b>Q</b> pickup · <b>Sword</b> rotate · <b>Pickaxe</b> remove · <b>Trident</b> move</div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
