<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Critter Trek</title>
  </head>
  <body>
    <div id="app"></div>
    <div id="info">WASD to move · A/D to turn · Click & drag to orbit</div>

    <div id="combat-overlay">
      <div id="combat-panel">
        <h2>⚔ Combat</h2>
        <div id="combat-stats">
          <div class="stat-row">
            <span class="stat-label">🦊 Fox</span>
            <span>HP: <span id="fox-hp">20</span></span>
          </div>
          <div class="stat-row">
            <span class="stat-label">🐺 Wolf</span>
            <span>HP: <span id="wolf-hp">12</span></span>
          </div>
        </div>
        <div id="combat-log"></div>
        <div id="combat-actions">
          <button id="btn-attack">Attack</button>
          <button id="btn-flee">Flee</button>
        </div>
      </div>
    </div>

    <div id="game-over-overlay">
      <div id="game-over-panel">
        <h1>The fox has fallen...</h1>
        <p>Refresh to try again.</p>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
